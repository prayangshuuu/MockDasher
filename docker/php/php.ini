; Memory & timeouts — generous for Gemini API calls and PDF export
memory_limit = 256M
max_execution_time = 300
max_input_time = 300

; File uploads (audio blobs from speaking tests, PDF exports)
upload_max_filesize = 50M
post_max_size = 50M

date.timezone = UTC

; Error reporting — log only, never display in production
display_errors = Off
display_startup_errors = Off
log_errors = On
