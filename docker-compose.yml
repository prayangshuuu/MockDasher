services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mockdasher_app
    restart: unless-stopped
    env_file: .env.docker
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8080}:80"
    networks:
      - mockdasher

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    container_name: mockdasher_worker
    restart: unless-stopped
    env_file: .env.docker
    command: ["worker"]
    volumes:
      - storage_app:/var/www/html/storage/app
      - storage_logs:/var/www/html/storage/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mockdasher

  mysql:
    image: mysql:8.4
    container_name: mockdasher_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-MockDasherDB}
      MYSQL_USER: ${DB_USERNAME:-mockdasher}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql:/docker-entrypoint-initdb.d
    ports:
      - "${DB_PORT_EXPOSE:-3306}:3306"
    networks:
      - mockdasher
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${DB_USERNAME:-mockdasher}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: mockdasher_redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - mockdasher
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  mysql_data:
  redis_data:
  storage_app:
  storage_logs:

networks:
  mockdasher:
    external: true
